<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>极值教程</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='extrema.css') }}"
    />
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
  </head>
  <body>
    <main class="lesson-shell">
      <header class="lesson-header">
        <nav class="top-links">
          <a href="/">返回故事机</a>
          <a href="/derivative-integral">求导教程</a>
        </nav>
        <div>
          <p class="eyebrow">应用教程</p>
          <h1>用导函数寻找最大值和最小值</h1>
          <p>
            极值不是靠眼睛猜出来的。导函数告诉我们函数在上升还是下降；当上升和下降发生切换时，就可能出现最高点或最低点。
          </p>
        </div>
      </header>

      <section class="lesson-layout">
        <aside class="lesson-nav">
          <p class="panel-title">五个故事</p>
          <div id="step-buttons" class="step-buttons">
            <button class="step-button active" data-step="sign">1. 导数看方向</button>
            <button class="step-button" data-step="minimum">2. 最低点</button>
            <button class="step-button" data-step="maximum">3. 最高点</button>
            <button class="step-button" data-step="both">4. 先升后降再升</button>
            <button class="step-button" data-step="warning">5. f'(x)=0 不一定是极值</button>
          </div>
        </aside>

        <section class="graph-panel">
          <div class="graph-header">
            <div>
              <p class="panel-title">GeoGebra 画面</p>
              <h2 id="step-title">导数看方向</h2>
            </div>
            <span id="step-chip" class="step-chip">上升或下降</span>
          </div>
          <div id="ggb-extrema" class="ggb-frame"></div>
        </section>

        <aside class="lesson-side">
          <section class="lesson-card">
            <p class="panel-title">这一幕要明白</p>
            <p id="step-description" class="copy"></p>
          </section>

          <section class="lesson-card formula-card">
            <p class="panel-title">判断方法</p>
            <p id="rule-line" class="formula-line"></p>
          </section>

          <section class="lesson-card">
            <p class="panel-title">拖动参数</p>
            <div id="control-fields" class="control-fields"></div>
          </section>

          <section class="lesson-card">
            <p class="panel-title">观察数字</p>
            <div id="metrics" class="metrics"></div>
          </section>
        </aside>
      </section>
    </main>

    <script
      src="{{ url_for('static', filename='extrema.js') }}"
      defer
    ></script>
  </body>
</html>
